<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Генератор Sitemap — Smotrim.net</title>
  <style>
    body { font-family: monospace; background: #0a0c10; color: #9aa3b8; padding: 20px; }
    h1 { color: #e63946; }
    .btn { background: #e63946; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 8px; }
    pre { background: #1a1e28; padding: 20px; border-radius: 8px; overflow: auto; max-height: 400px; color: #f0f2f8; font-size: 0.75rem; }
    a { color: #e63946; }
  </style>
</head>
<body>
<h1>Smotrim.net — Генератор Sitemap</h1>
<p>Этот скрипт генерирует sitemap.xml для поисковиков на основе каналов из API.</p>
<button class="btn" onclick="generateSitemap()">Сгенерировать sitemap.xml</button>
<button class="btn" onclick="downloadSitemap()">Скачать sitemap.xml</button>
<pre id="output">Нажмите кнопку для генерации...</pre>

<script>
const CONFIG = {
  streamApiUrl: 'https://aqeleulwobgamdffkfri.supabase.co/functions/v1/public-channels',
  allowedOwners: ['oinktech', 'Twixoff', 'ТВКАНАЛЫ'],
  siteUrl: window.location.origin
};

function slugify(str) {
  return str.toLowerCase()
    .replace(/[а-яёА-ЯЁ]/g, ch => {
      const m = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
      return m[ch] || ch;
    })
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

let sitemapXml = '';

async function generateSitemap() {
  document.getElementById('output').textContent = 'Загружаем каналы из API...';
  
  let channels = [];
  let page = 1, totalPages = 1;
  while (page <= totalPages && page <= 10) {
    const res = await fetch(`${CONFIG.streamApiUrl}?page=${page}&limit=50`);
    const json = await res.json();
    channels = [...channels, ...(json.data || [])];
    totalPages = json.pagination?.total_pages || 1;
    page++;
  }

  const allowed = channels.filter(c =>
    CONFIG.allowedOwners.some(o => o.toLowerCase() === (c.owner?.username||'').toLowerCase())
  );

  const today = new Date().toISOString().split('T')[0];

  const staticUrls = [
    { url: '/', priority: '1.0', freq: 'daily' },
    { url: '/tv', priority: '0.9', freq: 'daily' },
    { url: '/radio', priority: '0.9', freq: 'daily' },
    { url: '/iptv', priority: '0.8', freq: 'weekly' },
    { url: '/about', priority: '0.5', freq: 'monthly' },
  ];

  sitemapXml = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"
        xmlns:video="http://www.google.com/schemas/sitemap-video/1.1">

  <!-- Static pages -->
  ${staticUrls.map(u => `<url>
    <loc>${CONFIG.siteUrl}${u.url}</loc>
    <lastmod>${today}</lastmod>
    <changefreq>${u.freq}</changefreq>
    <priority>${u.priority}</priority>
  </url>`).join('\n  ')}

  <!-- Channel pages -->
  ${allowed.map(ch => `<url>
    <loc>${CONFIG.siteUrl}/watch/${slugify(ch.title)}</loc>
    <lastmod>${ch.updated_at ? ch.updated_at.split('T')[0] : today}</lastmod>
    <changefreq>always</changefreq>
    <priority>0.8</priority>
    ${ch.thumbnail_url ? `<video:video>
      <video:thumbnail_loc>${ch.thumbnail_url}</video:thumbnail_loc>
      <video:title>${ch.title.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</video:title>
      <video:description>${(ch.description||'Прямой эфир').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</video:description>
      <video:live>yes</video:live>
    </video:video>` : ''}
  </url>`).join('\n  ')}

</urlset>`;

  document.getElementById('output').textContent = sitemapXml;
  document.getElementById('output').textContent = sitemapXml;
  console.log(`Сгенерировано ${allowed.length} каналов + ${staticUrls.length} статических страниц`);
}

function downloadSitemap() {
  if (!sitemapXml) { alert('Сначала нажмите "Сгенерировать"'); return; }
  const blob = new Blob([sitemapXml], { type: 'application/xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sitemap.xml';
  a.click();
}
</script>
</body>
</html>
