<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Канал — Smotrim.net</title>
  <meta name="description" id="page-desc" content="Смотрите телеканал онлайн бесплатно на Smotrim.net. Прямой эфир без регистрации.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" id="canonical-link" href="/">

  <meta property="og:type" content="video.other">
  <meta property="og:url" id="og-url" content="/">
  <meta property="og:title" id="og-title" content="Смотреть онлайн — Smotrim.net">
  <meta property="og:description" id="og-desc" content="Прямой эфир бесплатно">
  <meta property="og:image" id="og-image" content="/og-image.jpg">
  <meta property="og:locale" content="ru_RU">
  <meta property="og:site_name" content="Smotrim.net">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="tw-title" content="Smotrim.net">
  <meta name="twitter:description" id="tw-desc" content="Прямой эфир ТВ онлайн">

  <script type="application/ld+json" id="schema-json">
  {
    "@context": "https://schema.org",
    "@type": "BroadcastEvent",
    "name": "Прямой эфир",
    "isLiveBroadcast": true,
    "broadcastOfEvent": {
      "@type": "Event",
      "name": "Прямой эфир телеканала"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <style>
    .watch-layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 24px; padding: 24px 0 32px; }
    .watch-main, .watch-sidebar { min-width: 0; }
    .watch-player-card {
      background: #0b1220;
      border: 1px solid #1f2a3f;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(2, 6, 23, 0.35);
    }
    .watch-source-switcher {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px;
      background: linear-gradient(180deg, #111b2e 0%, #0b1220 100%);
      border-bottom: 1px solid #1f2a3f;
    }
    .source-btn {
      border: 1px solid #263653;
      background: #111b2e;
      color: #d8e4ff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: .2s ease;
      font-weight: 600;
    }
    .source-btn:hover { border-color: #3f5c93; color: #fff; }
    .source-btn.active { background: #0f69ff; border-color: #0f69ff; color: #fff; }
    .watch-player-wrap { position: relative; padding-bottom: 56.25%; background: #0f172a; }
    .watch-player-wrap iframe, .watch-player-wrap .player-state { position: absolute; inset: 0; width: 100%; height: 100%; }
    .player-state {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
      font-size: 0.95rem;
      text-align: center;
      padding: 20px;
    }
    .watch-info { margin-top: 16px; padding: 20px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); }
    .watch-title { font-family: var(--font-head); font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .watch-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.8rem; color: var(--text2); margin-bottom: 12px; }
    .watch-desc { font-size: 0.93rem; color: var(--text2); line-height: 1.6; }
    .sidebar-title { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .sidebar-channels { display: flex; flex-direction: column; gap: 8px; max-height: 660px; overflow-y: auto; }
    .sidebar-ch-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); text-decoration: none; color: var(--text); transition: border-color .2s; font-size: .825rem; }
    .sidebar-ch-item:hover { border-color: var(--accent); }
    .sidebar-ch-thumb { width: 44px; height: 30px; background: var(--bg3); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; overflow: hidden; }
    .sidebar-ch-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .sidebar-ch-name { font-weight: 500; line-height: 1.3; }
    .notice-error {
      margin-top: 12px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #9f1239;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: .86rem;
      display: none;
    }
    .notice-error.show { display: block; }
    @media (max-width: 900px) {
      .watch-layout { grid-template-columns: 1fr; }
      .watch-sidebar { order: 2; }
      .watch-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-icon">▶</span>
      <span class="logo-text">smotrim<span class="logo-dot">.net</span></span>
    </a>
    <nav class="main-nav">
      <a href="/" class="nav-link">← Все каналы</a>
    </nav>
  </div>
</header>

<div class="container">
  <nav aria-label="Хлебные крошки" style="padding:16px 0;font-size:0.8rem;color:var(--text3);">
    <a href="/" style="color:var(--text3);text-decoration:none;">Главная</a>
    <span style="margin:0 6px;">›</span>
    <a href="/" style="color:var(--text3);text-decoration:none;">Телеканалы</a>
    <span style="margin:0 6px;">›</span>
    <span id="breadcrumb-name" style="color:var(--text);">Загрузка...</span>
  </nav>

  <div class="watch-layout">
    <div class="watch-main">
      <div class="watch-player-card">
        <div class="watch-source-switcher" id="source-switcher"></div>
        <div class="watch-player-wrap" id="watch-player">
          <div class="player-state">Загрузка плеера…</div>
        </div>
      </div>
      <div class="notice-error" id="watch-error"></div>
      <div class="watch-info" id="watch-info">
        <h1 class="watch-title" id="watch-title">Загрузка...</h1>
        <div class="watch-meta" id="watch-meta"></div>
        <p class="watch-desc" id="watch-desc"></p>
      </div>
    </div>

    <aside class="watch-sidebar">
      <div class="sidebar-title">Другие StreamLiveTV каналы</div>
      <div class="sidebar-channels" id="sidebar-channels">
        <div class="loading-state" style="padding:20px 0">
          <div class="spinner" style="width:24px;height:24px;"></div>
        </div>
      </div>
    </aside>
  </div>
</div>

<footer class="site-footer" style="margin-top:40px;">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025–2026 Smotrim.net — Все права защищены.</p>
    </div>
  </div>
</footer>

<script>
const CONFIG = {
  streamApiUrl: 'https://aqeleulwobgamdffkfri.supabase.co/functions/v1/public-channels',
  allowedOwners: ['oinktech', 'Twixoff', 'ТВКАНАЛЫ'],
  playerSources: [
    { key: 'streamlivetv', label: 'StreamLiveTV', buildUrl: id => `https://stlivetv.tatnet.app/embed/${encodeURIComponent(id)}` },
    { key: 'studio', label: 'EmbessLiveStudio', buildUrl: id => `https://embesslivestudio.lovable.app/player?channel=${encodeURIComponent(id)}` }
  ]
};

const state = {
  channels: [],
  activeChannel: null,
  source: 'streamlivetv'
};

function slugify(str) {
  return (str || '').toLowerCase()
    .replace(/[а-яёА-ЯЁ]/g, ch => {
      const m = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
      return m[ch] || ch;
    })
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function normalizeSlug(value) {
  return decodeURIComponent((value || '').toString().trim().toLowerCase())
    .replace(/[^a-z0-9а-яё]+/gi, '-')
    .replace(/-+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function slugsMatch(a, b) {
  const na = normalizeSlug(a);
  const nb = normalizeSlug(b);
  return Boolean(na && nb && (na === nb || na.replace(/-/g, '') === nb.replace(/-/g, '')));
}

function escapeHtml(str = '') {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getRequestedChannel() {
  const params = new URLSearchParams(window.location.search);
  const channelId = params.get('channel_id') || '';
  const source = params.get('source') || '';
  const slugFromQuery = (params.get('channel') || '').trim();

  if (source && CONFIG.playerSources.some(s => s.key === source)) {
    state.source = source;
  }

  if (channelId || slugFromQuery) {
    return { channelId, slug: normalizeSlug(slugFromQuery) };
  }

  const path = window.location.pathname;
  if (path.startsWith('/watch/')) {
    return { channelId: '', slug: normalizeSlug(path.replace('/watch/', '').replace(/^\/+/, '')) };
  }

  const hash = window.location.hash.replace(/^#/, '').trim();
  if (hash.startsWith('watch/')) {
    return { channelId: '', slug: normalizeSlug(hash.replace('watch/', '')) };
  }

  return { channelId: '', slug: '' };
}

function setError(message) {
  const errorEl = document.getElementById('watch-error');
  errorEl.textContent = message;
  errorEl.classList.add('show');
}

function clearError() {
  const errorEl = document.getElementById('watch-error');
  errorEl.textContent = '';
  errorEl.classList.remove('show');
}

function renderPlayer() {
  const channel = state.activeChannel;
  const source = CONFIG.playerSources.find(s => s.key === state.source) || CONFIG.playerSources[0];
  const watchPlayer = document.getElementById('watch-player');

  if (!channel) {
    watchPlayer.innerHTML = '<div class="player-state">Канал пока недоступен.</div>';
    return;
  }

  const embedUrl = source.buildUrl(channel.id);
  watchPlayer.innerHTML = `<iframe src="${embedUrl}" allowfullscreen allow="autoplay; fullscreen; picture-in-picture" frameborder="0" loading="eager" title="${escapeHtml(channel.title)} — прямой эфир"></iframe>`;
}

function renderSourceSwitcher() {
  const switcher = document.getElementById('source-switcher');
  switcher.innerHTML = CONFIG.playerSources.map(source => (
    `<button class="source-btn ${source.key === state.source ? 'active' : ''}" type="button" data-source="${source.key}">Источник: ${source.label}</button>`
  )).join('');

  switcher.querySelectorAll('.source-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.source = btn.dataset.source;
      renderSourceSwitcher();
      renderPlayer();
      const url = new URL(window.location.href);
      url.searchParams.set('source', state.source);
      history.replaceState({}, '', url.pathname + url.search + url.hash);
    });
  });
}

function applySeo(channel) {
  const title = `${channel.title} — смотреть онлайн прямой эфир | Smotrim.net`;
  const desc = `Смотрите ${channel.title} онлайн бесплатно на Smotrim.net. ${channel.description || 'Прямой эфир без регистрации и рекламы.'}`;
  const watchPath = `${window.location.origin}/watch/${encodeURIComponent(slugify(channel.title))}`;

  document.getElementById('page-title').textContent = title;
  document.title = title;
  document.getElementById('page-desc').content = desc;
  document.getElementById('og-title').content = title;
  document.getElementById('og-desc').content = desc;
  document.getElementById('tw-title').content = title;
  document.getElementById('tw-desc').content = desc;
  document.getElementById('canonical-link').href = watchPath;
  document.getElementById('og-url').content = watchPath;
  if (channel.thumbnail_url) document.getElementById('og-image').content = channel.thumbnail_url;

  document.getElementById('breadcrumb-name').textContent = channel.title;
  document.getElementById('watch-title').textContent = channel.title;
  document.getElementById('watch-desc').textContent = channel.description || 'Прямой эфир — смотрите бесплатно';
  document.getElementById('watch-meta').innerHTML = `
    <span>👤 ${escapeHtml(channel.owner?.username || '—')}</span>
    <span>📺 ${channel.channel_type === 'radio' ? 'Радио' : 'ТВ'}</span>
    <span class="live-badge-inline" style="background:var(--live);font-size:0.65rem;padding:2px 7px;border-radius:4px;color:#fff;font-weight:700;">🔴 LIVE</span>
  `;

  const schema = {
    '@context': 'https://schema.org',
    '@type': 'BroadcastEvent',
    name: channel.title,
    description: channel.description || '',
    isLiveBroadcast: true,
    url: watchPath,
    image: channel.thumbnail_url || '',
    broadcastOfEvent: {
      '@type': 'Event',
      name: `${channel.title} прямой эфир`
    }
  };
  document.getElementById('schema-json').textContent = JSON.stringify(schema);
}

function renderSidebar() {
  const root = document.getElementById('sidebar-channels');
  const currentId = state.activeChannel?.id;
  const others = state.channels
    .filter(c => c.id !== currentId && c.channel_type === 'tv')
    .slice(0, 30);

  root.innerHTML = others.map(c => `
    <a class="sidebar-ch-item" href="/watch/${encodeURIComponent(slugify(c.title))}" title="${escapeHtml(c.title)} — смотреть онлайн">
      <div class="sidebar-ch-thumb">
        ${c.thumbnail_url ? `<img src="${escapeHtml(c.thumbnail_url)}" alt="${escapeHtml(c.title)}" loading="lazy">` : '📺'}
      </div>
      <span class="sidebar-ch-name">${escapeHtml(c.title)}</span>
    </a>
  `).join('');
}

async function loadChannels() {
  const request = getRequestedChannel();
  let channels = [];
  let page = 1;
  let totalPages = 1;

  while (page <= totalPages && page <= 12) {
    const res = await fetch(`${CONFIG.streamApiUrl}?page=${page}&limit=50`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    channels = channels.concat(json.data || []);
    totalPages = json.pagination?.total_pages || 1;
    page++;
  }

  const allowed = channels.filter(c => CONFIG.allowedOwners.some(o => o.toLowerCase() === (c.owner?.username || '').toLowerCase()));
  state.channels = allowed;

  const normalizedSlug = normalizeSlug(request.slug);
  const channel = allowed.find(c => {
    const titleSlug = slugify(c.title || '');
    return c.id === request.channelId
      || slugsMatch(titleSlug, normalizedSlug)
      || slugsMatch(c.id || '', normalizedSlug);
  });

  if (!channel) {
    throw new Error('Канал не найден: проверьте URL или обновите страницу.');
  }

  state.activeChannel = channel;
  applySeo(channel);
  renderSourceSwitcher();
  renderPlayer();
  renderSidebar();
}

(async function initWatchPage() {
  try {
    clearError();
    await loadChannels();
  } catch (err) {
    console.error('watch page error', err);
    setError('Не удалось загрузить канал. Обновите страницу или переключите источник в плеере.');
    document.getElementById('watch-player').innerHTML = '<div class="player-state">Ошибка загрузки канала</div>';
    document.getElementById('watch-title').textContent = 'Канал недоступен';
    document.getElementById('watch-desc').textContent = 'Временная проблема с API или источником плеера.';
    renderSourceSwitcher();
  }
})();
</script>
</body>
</html>
