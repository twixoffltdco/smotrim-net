<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Канал — Smotrim.net</title>
  <meta name="description" id="page-desc" content="Смотрите телеканал онлайн бесплатно на Smotrim.net. Прямой эфир без регистрации.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" id="canonical-link" href="https://smotrim.net/">

  <!-- Open Graph -->
  <meta property="og:type" content="video.other">
  <meta property="og:url" id="og-url" content="https://smotrim.net/">
  <meta property="og:title" id="og-title" content="Смотреть онлайн — Smotrim.net">
  <meta property="og:description" id="og-desc" content="Прямой эфир бесплатно">
  <meta property="og:image" id="og-image" content="https://smotrim.net/og-image.jpg">
  <meta property="og:locale" content="ru_RU">
  <meta property="og:site_name" content="Smotrim.net">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="tw-title" content="Smotrim.net">
  <meta name="twitter:description" id="tw-desc" content="Прямой эфир ТВ онлайн">

  <!-- Schema.org VideoObject -->
  <script type="application/ld+json" id="schema-json">
  {
    "@context": "https://schema.org",
    "@type": "BroadcastEvent",
    "name": "Прямой эфир",
    "isLiveBroadcast": true,
    "broadcastOfEvent": {
      "@type": "Event",
      "name": "Прямой эфир телеканала"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <style>
    .watch-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      padding: 24px 0;
    }
    .watch-main {}
    .watch-sidebar {}
    .watch-player-wrap {
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      padding-bottom: 56.25%;
    }
    .watch-player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .watch-info {
      margin-top: 16px;
      padding: 20px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .watch-title {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .watch-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 12px;
    }
    .watch-desc {
      font-size: 0.9rem;
      color: var(--text2);
      line-height: 1.6;
    }
    .sidebar-title {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-channels {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 600px;
      overflow-y: auto;
    }
    .sidebar-ch-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s;
      font-size: 0.825rem;
    }
    .sidebar-ch-item:hover { border-color: var(--accent); }
    .sidebar-ch-thumb {
      width: 44px;
      height: 30px;
      background: var(--bg3);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-ch-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .sidebar-ch-name { font-weight: 500; line-height: 1.3; }
    @media (max-width: 900px) {
      .watch-layout { grid-template-columns: 1fr; }
      .watch-sidebar { order: 2; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-icon">▶</span>
      <span class="logo-text">smotrim<span class="logo-dot">.net</span></span>
    </a>
    <nav class="main-nav">
      <a href="/" class="nav-link">← Все каналы</a>
    </nav>
  </div>
</header>

<div class="container">
  <!-- Breadcrumb for SEO -->
  <nav aria-label="Хлебные крошки" style="padding:16px 0;font-size:0.8rem;color:var(--text3);">
    <a href="/" style="color:var(--text3);text-decoration:none;">Главная</a>
    <span style="margin:0 6px;">›</span>
    <a href="/tv" style="color:var(--text3);text-decoration:none;">Телеканалы</a>
    <span style="margin:0 6px;">›</span>
    <span id="breadcrumb-name" style="color:var(--text);">Загрузка...</span>
  </nav>

  <div class="watch-layout">
    <div class="watch-main">
      <div class="watch-player-wrap" id="watch-player">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#111;">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="watch-info" id="watch-info">
        <h1 class="watch-title" id="watch-title">Загрузка...</h1>
        <div class="watch-meta" id="watch-meta"></div>
        <p class="watch-desc" id="watch-desc"></p>
      </div>
    </div>

    <div class="watch-sidebar">
      <div class="sidebar-title">Другие каналы</div>
      <div class="sidebar-channels" id="sidebar-channels">
        <div class="loading-state" style="padding:20px 0">
          <div class="spinner" style="width:24px;height:24px;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer" style="margin-top:40px;">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025–2026 Smotrim.net — Все права защищены.</p>
    </div>
  </div>
</footer>

<script>
const CONFIG = {
  streamApiUrl: 'https://aqeleulwobgamdffkfri.supabase.co/functions/v1/public-channels',
  embedBase: 'https://stlivetv.tatnet.app/embed/',
  allowedOwners: ['oinktech', 'Twixoff', 'ТВКАНАЛЫ'],
};

function slugify(str) {
  return str.toLowerCase()
    .replace(/[а-яёА-ЯЁ]/g, ch => {
      const m = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
      return m[ch] || ch;
    })
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

async function loadChannel() {
  const path = window.location.pathname;
  const slug = path.replace('/watch/', '').replace(/^\/+/, '');

  let channels = [];
  let page = 1, totalPages = 1;
  while (page <= totalPages && page <= 10) {
    const res = await fetch(`${CONFIG.streamApiUrl}?page=${page}&limit=50`);
    const json = await res.json();
    channels = [...channels, ...(json.data || [])];
    totalPages = json.pagination?.total_pages || 1;
    page++;
  }

  const allowed = channels.filter(c => CONFIG.allowedOwners.some(o => o.toLowerCase() === (c.owner?.username||'').toLowerCase()));
  const channel = allowed.find(c => slugify(c.title) === slug || c.id === slug);

  if (!channel) {
    document.getElementById('watch-title').textContent = 'Канал не найден';
    return;
  }

  // SEO
  const title = `${channel.title} — смотреть онлайн прямой эфир | Smotrim.net`;
  const desc = `Смотрите ${channel.title} онлайн бесплатно на Smotrim.net. ${channel.description || 'Прямой эфир без регистрации и без рекламы.'}`;

  document.getElementById('page-title').textContent = title;
  document.title = title;
  document.getElementById('page-desc').content = desc;
  document.getElementById('og-title').content = title;
  document.getElementById('og-desc').content = desc;
  document.getElementById('tw-title').content = title;
  document.getElementById('tw-desc').content = desc;
  document.getElementById('canonical-link').href = `https://smotrim.net/watch/${slugify(channel.title)}`;
  document.getElementById('og-url').content = `https://smotrim.net/watch/${slugify(channel.title)}`;
  if (channel.thumbnail_url) document.getElementById('og-image').content = channel.thumbnail_url;
  document.getElementById('breadcrumb-name').textContent = channel.title;
  document.getElementById('watch-title').textContent = channel.title;
  document.getElementById('watch-desc').textContent = channel.description || 'Прямой эфир — смотрите бесплатно';
  document.getElementById('watch-meta').innerHTML = `
    <span>👤 ${channel.owner?.username || ''}</span>
    <span>📺 ${channel.channel_type === 'radio' ? 'Радио' : 'ТВ'}</span>
    <span class="live-badge-inline" style="background:var(--live);font-size:0.65rem;padding:2px 7px;border-radius:4px;color:#fff;font-weight:700;">🔴 LIVE</span>
  `;

  // Schema.org
  const schema = {
    "@context": "https://schema.org",
    "@type": "BroadcastEvent",
    "name": channel.title,
    "description": channel.description || '',
    "isLiveBroadcast": true,
    "url": `https://smotrim.net/watch/${slugify(channel.title)}`,
    "image": channel.thumbnail_url || '',
    "broadcastOfEvent": {
      "@type": "Event",
      "name": channel.title + " прямой эфир"
    }
  };
  document.getElementById('schema-json').textContent = JSON.stringify(schema);

  // Player
  const embedUrl = `${CONFIG.embedBase}${channel.id}`;
  document.getElementById('watch-player').innerHTML = `
    <iframe src="${embedUrl}" allowfullscreen allow="autoplay;fullscreen;picture-in-picture" frameborder="0" title="${channel.title} — прямой эфир"></iframe>
  `;

  // Sidebar
  const others = allowed.filter(c => c.id !== channel.id && c.channel_type === 'tv').slice(0, 20);
  document.getElementById('sidebar-channels').innerHTML = others.map(c => `
    <a class="sidebar-ch-item" href="/watch/${slugify(c.title)}" title="${c.title} — смотреть онлайн">
      <div class="sidebar-ch-thumb">
        ${c.thumbnail_url ? `<img src="${c.thumbnail_url}" alt="${c.title}" loading="lazy">` : '📺'}
      </div>
      <span class="sidebar-ch-name">${c.title}</span>
    </a>
  `).join('');
}

loadChannel();
</script>
</body>
</html>
